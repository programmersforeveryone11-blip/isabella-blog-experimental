<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Galería iPhone ♡</title>
    <style>
        /* Fondo con degradado suave Rosita y Verde Matcha */
        body {
            background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #fce4ec 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor estilo iPhone */
        .iphone-frame {
            background-color: #000;
            width: 350px;
            height: 700px;
            border-radius: 50px;
            border: 8px solid #333;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Barra de estado superior */
        .status-bar {
            height: 40px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
        }

        /* Contenido de la Galería */
        .gallery-content {
            flex: 1;
            background-color: white;
            margin: 0 10px 10px 10px;
            border-radius: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .gallery-header {
            padding: 20px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .gallery-header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            color: #000;
        }

        .gallery-header span {
            color: #007aff;
            font-weight: 500;
            cursor: pointer;
        }

        /* Cuadrícula de fotos optimizada para ver todas */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 5px;
        }

        .photo-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            transition: opacity 0.2s;
            background-color: #f0f0f0;
            /* Fondo por si tarda en cargar */
        }

        .photo-item:hover {
            opacity: 0.8;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Mantiene la cuadrícula uniforme */
            display: block;
        }

        /* Barra de navegación inferior (Tabs) */
        .tab-bar {
            height: 60px;
            background-color: rgba(248, 248, 248, 0.9);
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 5px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            font-size: 10px;
        }

        .tab-item.active {
            color: #007aff;
        }

        .tab-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        /* Botón volver */
        .home-button {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background-color: #000;
            border-radius: 10px;
        }

        /* Personalización del scroll */
        .gallery-content::-webkit-scrollbar {
            width: 0px;
        }

        .back-btn {
            position: absolute;
            top: -50px;
            color: #555;
            text-decoration: none;
            font-weight: bold;
            background: white;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #fce4ec;
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-btn">⬅ Regresar al Inicio</a>

    <div class="iphone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>

        <div class="gallery-content">
            <div class="gallery-header">
                <h1>Biblioteca</h1>

            </div>

            <div class="photo-grid">
                <!-- Foto 1 -->
                <div class="photo-item">
                    <img src="mali core.jpg" alt="Mali Core">
                </div>
                <!-- Foto 2 -->
                <div class="photo-item">

                        alt="Cámara Canon">
                </div>
                <!-- Foto 3 -->
                <div class="photo-item">
                    <img src="camara.jpg" alt="Cámara Olympus">
                </div>
                <!-- Foto 4 -->
                <div class="photo-item">
                    <img src="olinpus.jpg"
                        alt="Cámara Olympus Vintage">
                </div>
                <!-- Foto 5 -->
                <div class="photo-item">
                    <img src="ig.jpg"
                        alt="Estética Coquette">

                <!-- Foto 6 -->
                <div class="photo-item">
                    <img src="cassie hobbes.jpg" alt="Cassie Hobbes">
                </div>
                <!-- Foto 7 -->
                <div class="photo-item">
                    <img src="htht.png" alt="Diseño htht">
                </div>
                <!-- Foto 8 -->
                <div class="photo-item">
                    <img src="isabell.png" alt="Isabell">
                </div>
                <!-- Foto 9 -->
                <div class="photo-item">
                    <img src="╰┈➤ beatles girl _ beatles _ aesthetic _ music.jpg" alt="Chica Beatles">
                </div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active">
                <span class="tab-icon">🖼️</span>
                <span>Fototeca</span>
            </div>
            <div class="tab-item">
                <span class="tab-icon">🔍</span>
                <span>Para ti</span>
            </div>
            <div class="tab-item">
                <span class="tab-icon">📁</span>
                <span>Álbumes</span>
            </div>
            <div class="tab-item">
                <span class="tab-icon">🔎</span>
                <span>Buscar</span>
            </div>
        </div>
        <div class="home-button"></div>
    </div>

</body>

</html>
